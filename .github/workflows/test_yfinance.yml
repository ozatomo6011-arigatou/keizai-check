name: Test yfinance freshness

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance

      - name: Check Nikkei freshness
        run: |
          python -c "
          import yfinance as yf
          df = yf.download(['^N225','^DJI','^GSPC','^IXIC','^SOX'], period='5d', interval='1d', progress=False, auto_adjust=True)
          print(df['Close'])
          "
